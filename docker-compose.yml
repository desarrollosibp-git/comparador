services:
  redis:
    image: redis:7-alpine
    container_name: matcher-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  matcher-api:
    build: .
    container_name: record-matching-api
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MATCHER_JOBS_DB_PATH=/app/data/matcher_jobs.db
      - MATCHER_TASK_MAX_RETRIES=3
      - MATCHER_TASK_RETRY_BASE_SECONDS=5
      - MATCHER_TASK_TIME_LIMIT=180
      - MATCHER_TASK_SOFT_TIME_LIMIT=150
      - MATCHER_JOB_TOKEN=${MATCHER_JOB_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - matcher_data:/app/data
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/docs')\""]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  matcher-worker:
    build: .
    container_name: record-matching-worker
    working_dir: /app/app
    command: celery -A celery_app.celery worker --loglevel=info --concurrency=2
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MATCHER_JOBS_DB_PATH=/app/data/matcher_jobs.db
      - MATCHER_TASK_MAX_RETRIES=3
      - MATCHER_TASK_RETRY_BASE_SECONDS=5
      - MATCHER_TASK_TIME_LIMIT=180
      - MATCHER_TASK_SOFT_TIME_LIMIT=150
      - MATCHER_JOB_TOKEN=${MATCHER_JOB_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - matcher_data:/app/data
    restart: unless-stopped

volumes:
  matcher_data: